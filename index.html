   <h1>🎮 Моя игра с VK Bridge</h1>
    <p>Этот файл демонстрирует базовую интеграцию VK Bridge.</p>

    <!-- Карточка с информацией о пользователе -->
    <div class="card">
        <h2>👤 Пользователь</h2>
        <button id="getUserBtn">Получить данные пользователя</button>
        <pre id="userInfo">(нажмите кнопку)</pre>
    </div>

    <!-- Карточка с рекламой -->
    <div class="card">
        <h2>📢 Реклама</h2>
        <button id="checkRewardBtn">Проверить готовность reward</button>
        <button id="showRewardBtn" disabled>Показать reward видео</button>
        <button id="showInterstitialBtn">Показать межстраничную</button>
        <button id="showBannerBtn">Показать баннер</button>
        <button id="hideBannerBtn">Скрыть баннер</button>
    </div>

    <!-- Лог событий -->
    <div class="card">
        <h2>📋 Лог</h2>
        <div class="log" id="log"></div>
    </div>

    <!-- Подключение VK Bridge с CDN -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <script>
        // Функция для записи в лог
        function log(message, data = '') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${time}] ${message} ${data ? JSON.stringify(data) : ''}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Инициализация VK Bridge
        bridge.send('VKWebAppInit')
            .then(() => log('✅ VKWebAppInit успешен'))
            .catch(e => log('❌ Ошибка инициализации', e));

        // Переменная для хранения состояния готовности reward
        let isRewardReady = false;

        // ============================================
        // 1. Получение данных пользователя
        // ============================================
        document.getElementById('getUserBtn').addEventListener('click', () => {
            bridge.send('VKWebAppGetUserInfo')
                .then(data => {
                    document.getElementById('userInfo').textContent = JSON.stringify(data, null, 2);
                    log('✅ Данные пользователя получены', data);
                })
                .catch(e => {
                    log('❌ Ошибка получения пользователя', e);
                    document.getElementById('userInfo').textContent = 'Ошибка: ' + e.message;
                });
        });

        // ============================================
        // 2. Проверка готовности reward рекламы
        // ============================================
        document.getElementById('checkRewardBtn').addEventListener('click', () => {
            bridge.send('VKWebAppCheckNativeAds', { ad_format: 'reward' })
                .then(data => {
                    isRewardReady = data.result;
                    document.getElementById('showRewardBtn').disabled = !isRewardReady;
                    log('📊 Проверка reward:', data);
                })
                .catch(e => log('❌ Ошибка проверки reward', e));
        });

        // ============================================
        // 3. Показ reward рекламы
        // ============================================
        document.getElementById('showRewardBtn').addEventListener('click', () => {
            bridge.send('VKWebAppShowNativeAds', { ad_format: 'reward' })
                .then(data => {
                    log('🎉 Reward реклама показана', data);
                    // Здесь можно начислить награду
                    alert('Награда получена!');
                    // После показа снова проверяем доступность
                    bridge.send('VKWebAppCheckNativeAds', { ad_format: 'reward' })
                        .then(data => {
                            isRewardReady = data.result;
                            document.getElementById('showRewardBtn').disabled = !isRewardReady;
                        });
                })
                .catch(e => {
                    log('❌ Ошибка показа reward', e);
                    alert('Не удалось показать рекламу');
                });
        });

        // ============================================
        // 4. Показ межстраничной рекламы
        // ============================================
        document.getElementById('showInterstitialBtn').addEventListener('click', () => {
            // Предварительно проверяем (не обязательно, но помогает избежать ошибок)
            bridge.send('VKWebAppCheckNativeAds', { ad_format: 'interstitial' })
                .then(check => {
                    if (check.result) {
                        return bridge.send('VKWebAppShowNativeAds', { ad_format: 'interstitial' });
                    } else {
                        throw new Error('Межстраничная реклама не готова');
                    }
                })
                .then(data => log('📺 Межстраничная реклама показана', data))
                .catch(e => log('❌ Ошибка показа межстраничной', e));
        });

        // ============================================
        // 5. Показ и скрытие баннера
        // ============================================
        document.getElementById('showBannerBtn').addEventListener('click', () => {
            bridge.send('VKWebAppShowBannerAd', { banner_location: 'bottom' })
                .then(data => log('🖼️ Баннер показан', data))
                .catch(e => log('❌ Ошибка показа баннера', e));
        });

        document.getElementById('hideBannerBtn').addEventListener('click', () => {
            bridge.send('VKWebAppHideBannerAd')
                .then(data => log('🖼️ Баннер скрыт', data))
                .catch(e => log('❌ Ошибка скрытия баннера', e));
        });

        // ============================================
        // Дополнительно: автоматическая проверка reward при загрузке
        // ============================================
        bridge.send('VKWebAppCheckNativeAds', { ad_format: 'reward' })
            .then(data => {
                isRewardReady = data.result;
                document.getElementById('showRewardBtn').disabled = !isRewardReady;
                log('📊 Начальная проверка reward:', data);
            })
            .catch(e => log('❌ Начальная проверка reward не удалась', e));
    </script>
