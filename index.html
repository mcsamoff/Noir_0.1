    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
    <script>
        // ======================== НАДЁЖНОЕ УПРАВЛЕНИЕ АУДИО ========================
        (function() {
            // Множество для хранения известных AudioContext
            window.__audioContexts = new Set();

            // Функция для сбора всех AudioContext из глобальных объектов (без рекурсии)
            function collectAudioContexts() {
                // Перебираем все ключи window (только собственные свойства)
                for (let key in window) {
                    try {
                        let obj = window[key];
                        // Проверяем, является ли объект AudioContext
                        if (obj && (obj instanceof (window.AudioContext || window.webkitAudioContext))) {
                            if (obj.state !== 'closed') {
                                window.__audioContexts.add(obj);
                            }
                        }
                    } catch (e) {}
                }
            }

            // Перехватываем создание новых AudioContext (для будущих)
            const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
            if (OriginalAudioContext) {
                window.AudioContext = function(...args) {
                    const ctx = new OriginalAudioContext(...args);
                    window.__audioContexts.add(ctx);
                    return ctx;
                };
                // Для webkit
                window.webkitAudioContext = window.AudioContext;
            }

            // Приостановка/возобновление всех известных контекстов
            window.setPageAudioMuted = function(mute) {
                // Сначала собираем все возможные контексты из глобальных объектов
                collectAudioContexts();
                // Теперь применяем mute/unmute
                window.__audioContexts.forEach(ctx => {
                    try {
                        if (mute && ctx.state === 'running') {
                            ctx.suspend();
                        } else if (!mute && ctx.state === 'suspended') {
                            ctx.resume();
                        }
                    } catch (e) {}
                });
                console.log(`[Audio] ${mute ? 'suspended' : 'resumed'} ${window.__audioContexts.size} contexts`);
            };
        })();

        // ======================== ИНИЦИАЛИЗАЦИЯ ЯНДЕКС SDK ========================
        window.ysdk = null;
        window.ysdkPlayer = null;

        async function initYandexSDK() {
            try {
                const ysdk = await YaGames.init();
                window.ysdk = ysdk;
                console.log('[Yandex] SDK initialized');

                ysdk.features.LoadingAPI?.ready();

                // --- Игрок ---
                try {
                    const player = await ysdk.getPlayer({ signed: true });
                    window.ysdkPlayer = player;
                    console.log('[Yandex] Player loaded');
                } catch (err) {
                    console.warn('[Yandex] Player error:', err);
                }

                // --- Автоопределение языка ---
                const lang = ysdk.environment?.i18n?.lang || 'en';
                console.log('[Yandex] Detected language:', lang);

                // --- Подписка на события сворачивания ---
                ysdk.on('game_api_pause', () => {
                    console.log('[Yandex] Pause event');
                    window.setPageAudioMuted(true);
                });
                ysdk.on('game_api_resume', () => {
                    console.log('[Yandex] Resume event');
                    window.setPageAudioMuted(false);
                });

                // --- Реклама ---
                ysdk.adv.getBannerAdvStatus().then(({ stickyAdvIsShowing, reason }) => {
                    if (!stickyAdvIsShowing && !reason) {
                        ysdk.adv.showBannerAdv();
                    }
                });

                // --- Оценка ---
                ysdk.feedback.canReview().then(({ value, reason }) => {
                    if (value) {
                        ysdk.feedback.requestReview().then(({ feedbackSent }) => {
                            console.log('[Yandex] Review sent:', feedbackSent);
                        });
                    } else {
                        console.log('[Yandex] Review not available:', reason);
                    }
                });

                // --- GameplayAPI ---
                ysdk.features.GameplayAPI?.start();

                // Проверяем начальное состояние вкладки
                if (document.hidden) {
                    window.setPageAudioMuted(true);
                }
            } catch (error) {
                console.error('[Yandex] Init failed:', error);
            }
        }

        if (typeof YaGames !== 'undefined') {
            initYandexSDK();
        } else {
            console.warn('[Yandex] SDK not loaded');
        }

        // Резервный обработчик visibilitychange
        document.addEventListener('visibilitychange', () => {
            if (window.setPageAudioMuted) {
                window.setPageAudioMuted(document.hidden);
            }
        });
    </script>
